<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Studio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='-10 -10 120 120' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='46' stroke='%233b82f6' stroke-width='6' /%3E%3Cpath d='M35 35L20 50L35 65' stroke='%233b82f6' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M65 35L80 50L65 65' stroke='%233b82f6' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M55 30L45 70' stroke='%233b82f6' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/monokai.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/dialog/dialog.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #1a1b26;
            --bg-secondary: #16171f;
            --bg-tertiary: #1f2030;
            --border-color: #2a2b3d;
            --text-primary: #c0caf5;
            --text-secondary: #787c99;
            --accent: #5a7bf4;
            --accent-hover: #4a6be4;
            --danger: #f44;
            --radius: 10px;
            --transition: 0.25s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        :focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 7px 12px; border-radius: 6px; border: 1px solid transparent;
            background: transparent; color: var(--text-secondary);
            font-size: 12px; font-weight: 500; cursor: pointer;
            transition: all var(--transition); user-select: none;
        }
        .btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn:active { transform: scale(0.96); }
        .btn--icon { padding: 7px; }
        .btn--primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn--primary:hover { background: var(--accent-hover); }
        .btn--danger { color: var(--danger); }
        .btn--danger:hover { background: rgba(255,68,68,0.1); }

        .input-field {
            width: 100%; padding: 10px 14px; margin: 6px 0;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            color: var(--text-primary); border-radius: 8px; outline: none; 
            font-size: 13px; transition: all var(--transition);
        }
        .input-field:focus { border-color: var(--accent); }
        select.input-field option { background: var(--bg-secondary); color: var(--text-primary); }

        /* Header */
        .header {
            height: 52px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
            padding: 0 16px; display: flex; justify-content: space-between; align-items: center;
            position: relative; z-index: 100;
        }
        .header__left { display: flex; align-items: center; gap: 12px; }
        .header__logo {
            font-size: 15px; font-weight: 600; letter-spacing: -0.3px;
            color: var(--text-primary); cursor: default;
        }
        .header__logo span { color: var(--accent); }
        .header__actions { display: flex; gap: 4px; }

        /* Workspace */
        .workspace { height: calc(100% - 52px); display: flex; position: relative; }
        
        .panel {
            background: var(--bg-primary); border-right: 1px solid var(--border-color);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel__header {
            padding: 10px 16px; background: var(--bg-secondary);
            font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
            color: var(--text-secondary); text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
        }

        /* Sidebar */
        .sidebar {
            width: 280px; min-width: 280px; background: var(--bg-secondary);
            transition: all 0.3s ease;
        }
        .sidebar.hidden { width: 0; min-width: 0; overflow: hidden; border: none; }
        
        .tab-switch {
            display: flex; margin: 10px 10px 0; background: var(--bg-primary);
            border-radius: 6px; padding: 3px;
        }
        .tab-switch button {
            flex: 1; padding: 7px; border: none; background: transparent;
            color: var(--text-secondary); cursor: pointer; font-size: 11px;
            font-weight: 600; border-radius: 4px; transition: var(--transition);
        }
        .tab-switch button.active { background: var(--accent); color: #fff; }
        
        .repo-list { flex: 1; overflow-y: auto; padding: 10px; }
        .repo-card {
            padding: 12px; margin-bottom: 6px; background: var(--bg-primary);
            border-radius: 8px; cursor: pointer; transition: var(--transition);
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent;
        }
        .repo-card:hover { border-color: var(--border-color); }
        .repo-card__name { font-size: 13px; font-weight: 500; }
        .repo-card__badge {
            font-size: 10px; padding: 3px 8px; border-radius: 4px;
            background: var(--bg-tertiary); color: var(--text-secondary);
        }
        .repo-card__badge.public { color: #4ade80; }
        .repo-card__delete {
            background: none; border: none; color: var(--text-secondary);
            cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px;
            opacity: 0; transition: var(--transition);
        }
        .repo-card:hover .repo-card__delete { opacity: 1; }
        .repo-card__delete:hover { color: var(--danger); background: rgba(255,68,68,0.1); }

        /* Editor */
        .editor-container { flex: 1; min-width: 300px; }
        .CodeMirror {
            height: 100% !important; font-family: 'JetBrains Mono', 'Fira Code', monospace !important;
            font-size: 13.5px; line-height: 1.6; background: var(--bg-primary) !important;
        }
        .CodeMirror-gutters { background: var(--bg-primary) !important; border-right: 1px solid var(--border-color) !important; }
        .CodeMirror-linenumber { color: var(--text-secondary) !important; }

        /* Preview */
        .preview-container { flex: 1; min-width: 250px; }
        .preview-container iframe { flex: 1; border: none; background: #fff; width: 100%; height: 100%; }

        /* Resizer */
        .resizer {
            width: 4px; cursor: col-resize; background: transparent;
            transition: background var(--transition); position: relative; z-index: 10;
        }
        .resizer:hover, .resizer.active { background: var(--accent); }
        body.resizing { cursor: col-resize; user-select: none; }

        /* Fullscreen */
        .fullscreen-overlay {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg-primary);
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .fullscreen-overlay.active { opacity: 1; pointer-events: all; }
        .fullscreen-toolbar {
            height: 44px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; padding: 0 12px; gap: 8px;
        }
        .fullscreen-content { flex: 1; display: flex; }
        .fullscreen-editor { flex: 1; min-width: 0; }
        .fullscreen-minimap {
            width: 20%; min-width: 150px; max-width: 250px;
            background: var(--bg-secondary); border-left: 1px solid var(--border-color);
            overflow: hidden; position: relative;
        }
        .minimap-content {
            padding: 8px; font-family: 'JetBrains Mono', monospace; font-size: 4px;
            line-height: 1.5; color: var(--text-secondary); white-space: pre-wrap;
            word-break: break-all; user-select: none; opacity: 0.7;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: var(--radius); padding: 28px; width: 90%; max-width: 380px;
        }
        .modal h3 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .modal .btn { margin-top: 10px; }

        /* Login */
        .login-screen {
            position: fixed; inset: 0; z-index: 100000;
            background: var(--bg-primary); display: flex; align-items: center; justify-content: center;
        }
        .login-screen.hidden { display: none; }
        .login-form {
            background: var(--bg-secondary); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 36px; width: 90%; max-width: 360px;
            text-align: center;
        }
        .login-form h2 { font-size: 22px; font-weight: 600; margin-bottom: 20px; }
        .login-form h2 span { color: var(--accent); }

        /* Mobile nav */
        .mobile-nav {
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            height: 56px; background: var(--bg-secondary); border-top: 1px solid var(--border-color);
            z-index: 200; justify-content: space-around; align-items: center;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            color: var(--text-secondary); cursor: pointer; font-size: 10px; font-weight: 500;
            transition: color var(--transition);
        }
        .nav-item.active { color: var(--accent); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .preview-container { display: none; }
            .resizer { display: none; }
            .workspace { height: calc(100% - 52px - 56px); }
            .mobile-nav { display: flex; }
            .editor-container { flex: 1; }
            .panel.mobile-active { display: flex; position: absolute; inset: 0; z-index: 50; }
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js">
</script><script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/xml/xml.min.js">

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, Timestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD24nPrQ38jQarBMTSco5-JDVcKTvcofjs",
        authDomain: "education-15cd7.firebaseapp.com",
        projectId: "education-15cd7",
        storageBucket: "education-15cd7.firebasestorage.app",
        messagingSenderId: "527861318421",
        appId: "1:527861318421:web:18969dd6728be524d3df1c",
        databaseURL: "https://education-15cd7-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);
    let user = null, allRepos = [];

    // Kod hisoblash uchun vaqtinchalik buffer (refreshda tozalanadi)
    let calcSession = { buffer: [], lastSuffix: null, count: 0 };

    // Asosiy editor
    window.editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
        mode: "htmlmixed",
        theme: "monokai",
        lineNumbers: true,
        autoCloseTags: true,
        lineWrapping: true,
        extraKeys: {
            "Enter": function(cm) {
                const cursor = cm.getCursor();
                const line = cm.getLine(cursor.line);
                const ch = cursor.ch;
                
                // Kursor oldidagi matematik ifodani topish
                const textBefore = line.substring(0, ch);
                const mathRegex = /([\d\.]+)\s*([\/\*\+\-])\s*([\d\.]+(\s*[\/\*\+\-]\s*[\d\.]+)*)/g;
                let match, lastMatch = null;
                
                while ((match = mathRegex.exec(textBefore)) !== null) {
                    if (match.index + match[0].length <= ch) lastMatch = match;
                }
                
                if (lastMatch) {
                    const expr = lastMatch[0].trim();
                    const startPos = lastMatch.index;
                    const endPos = lastMatch.index + lastMatch[0].length;
                    
                    if (ch >= endPos) {
                        try {
                            const result = Function('"use strict"; return (' + expr + ')')();
                            if (isFinite(result) && !isNaN(result)) {
                                let finalResult = Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(4)).toString();
                                
                                // CSS birligini aniqlash
                                const beforeExpr = textBefore.substring(0, startPos);
                                const unitMatch = beforeExpr.match(/([\d\.]+)(px|rem|em|%|vh|vw)/g);
                                
                                if (unitMatch) {
                                    const lastUnit = unitMatch[unitMatch.length - 1].match(/(px|rem|em|%|vh|vw)/)[1];
                                    
                                    // Session davomida 3x bir xil suffix
                                    if (calcSession.lastSuffix === lastUnit) {
                                        calcSession.count++;
                                    } else {
                                        calcSession.lastSuffix = lastUnit;
                                        calcSession.count = 1;
                                    }
                                    
                                    if (calcSession.count >= 3) {
                                        finalResult += lastUnit;
                                    }
                                }
                                
                                cm.replaceRange(finalResult, 
                                    { line: cursor.line, ch: startPos },
                                    { line: cursor.line, ch: endPos }
                                );
                                cm.setCursor({ line: cursor.line, ch: startPos + finalResult.length });
                                return;
                            }
                        } catch(e) {}
                    }
                }
                cm.replaceSelection('\n');
            }
        }
    });

    // Fullscreen editor
    let fullscreenEditor = null;
    let isFullscreen = false;

    function updateMinimap() {
        const content = document.getElementById('minimap-content');
        if (content) content.textContent = fullscreenEditor ? fullscreenEditor.getValue() : '';
    }

    window.toggleFullscreen = function() {
        const overlay = document.getElementById('fullscreen-overlay');
        isFullscreen = !isFullscreen;
        
        if (isFullscreen) {
            if (!fullscreenEditor) {
                fullscreenEditor = CodeMirror(document.getElementById('fullscreen-editor'), {
                    value: editor.getValue(),
                    mode: "htmlmixed",
                    theme: "monokai",
                    lineNumbers: true,
                    autoCloseTags: true,
                    lineWrapping: true,
                    extraKeys: editor.options.extraKeys
                });
                fullscreenEditor.on('change', function() {
                    editor.setValue(fullscreenEditor.getValue());
                    updateMinimap();
                    updatePreview();
                });
            } else {
                fullscreenEditor.setValue(editor.getValue());
            }
            fullscreenEditor.refresh();
            updateMinimap();
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        } else {
            editor.setValue(fullscreenEditor.getValue());
            editor.refresh();
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isFullscreen) {
            toggleFullscreen();
        }
    });

    // Local storage
    const saved = localStorage.getItem('cs_code');
    if (saved) editor.setValue(saved);
    editor.on('change', function() {
        localStorage.setItem('cs_code', editor.getValue());
        updatePreview();
        if (user) set(ref(rtdb, `drafts/${user.uid}`), { code: editor.getValue(), t: Date.now() });
    });

    function updatePreview() {
        const doc = document.getElementById('preview').contentDocument;
        doc.open();
        doc.write('<style>body{font-family:sans-serif;padding:16px;color:#222;}</style>' + editor.getValue());
        doc.close();
    }

    // Sidebar
    window.toggleSidebar = function() {
        document.getElementById('sidebar').classList.toggle('hidden');
        setTimeout(() => editor.refresh(), 300);
    };

    window.filterRepos = function() {
        const term = document.getElementById('repo-search').value.toLowerCase();
        renderList(allRepos.filter(r => r.name.toLowerCase().includes(term)));
    };

    function renderList(items) {
        const list = document.getElementById('repo-list');
        list.innerHTML = '';
        const isAdmin = user && user.email === 'admin@admin.com';
        
        items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'repo-card';
            card.innerHTML = `
                <div>
                    <div class="repo-card__name">${item.name}</div>
                    <span class="repo-card__badge ${item.isPublic ? 'public' : ''}">${item.isPublic ? 'Public' : 'Private'}</span>
                </div>
            `;
            
            if (item.uid === user?.uid || isAdmin) {
                const del = document.createElement('button');
                del.className = 'repo-card__delete';
                del.textContent = 'x';
                del.onclick = async (e) => {
                    e.stopPropagation();
                    if (confirm('Delete this project?')) {
                        await deleteDoc(doc(db, "repos", item.id));
                    }
                };
                card.appendChild(del);
            }
            
            card.onclick = () => { editor.setValue(item.code); updatePreview(); };
            list.appendChild(card);
        });
    }

    // Resize
    const resizer = document.getElementById('resizer');
    const editorCont = document.getElementById('editor-container');
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.classList.add('resizing');
        resizer.classList.add('active');
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const rect = document.getElementById('workspace').getBoundingClientRect();
        const sidebar = document.getElementById('sidebar');
        const asideW = sidebar.classList.contains('hidden') ? 0 : sidebar.offsetWidth;
        let w = e.clientX - rect.left - asideW - 2;
        if (w < 250) w = 250;
        if (w > rect.width - asideW - 250) w = rect.width - asideW - 250;
        editorCont.style.width = w + 'px';
        editor.refresh();
    });

    document.addEventListener('mouseup', () => {
        if (isResizing) {
            isResizing = false;
            document.body.classList.remove('resizing');
            resizer.classList.remove('active');
        }
    });

    // Mobile
    window.switchMobile = function(view) {
        const editorC = document.getElementById('editor-container');
        const previewC = document.getElementById('preview-container');
        const sidebar = document.getElementById('sidebar');
        const navItems = document.querySelectorAll('.nav-item');
        
        [editorC, previewC, sidebar].forEach(el => el.classList.remove('mobile-active'));
        navItems.forEach(el => el.classList.remove('active'));
        
        if (view === 'editor') { editorC.classList.add('mobile-active'); navItems[0].classList.add('active'); }
        else if (view === 'preview') { previewC.classList.add('mobile-active'); navItems[1].classList.add('active'); }
        else { sidebar.classList.add('mobile-active'); navItems[2].classList.add('active'); }
        
        setTimeout(() => editor.refresh(), 100);
    };

    // Auth
    window.authAction = async function(type) {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if (!email || !pass) return alert('Enter email and password');
        try {
            if (type === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
            else await signInWithEmailAndPassword(auth, email, pass);
        } catch(e) { alert('Error: ' + e.message); }
    };

    onAuthStateChanged(auth, u => {
        user = u;
        document.getElementById('login-screen').classList.toggle('hidden', !!u);
        if (u) setTab('my');
    });

    window.setTab = function(t) {
        document.getElementById('tab-my').className = t === 'my' ? 'active' : '';
        document.getElementById('tab-pub').className = t === 'pub' ? 'active' : '';
        const q = t === 'my' 
            ? query(collection(db, "repos"), where("uid", "==", user.uid))
            : query(collection(db, "repos"), where("isPublic", "==", true));
        onSnapshot(q, snaps => {
            allRepos = [];
            snaps.forEach(d => allRepos.push({ id: d.id, ...d.data() }));
            filterRepos();
        });
    };

    window.openSaveModal = () => document.getElementById('save-modal').classList.add('active');
    
    window.saveRepo = async function() {
        const name = document.getElementById('repo-name').value;
        if (!name) return alert('Enter project name');
        const isPublic = document.getElementById('repo-visibility').value === 'public';
        await addDoc(collection(db, "repos"), {
            uid: user.uid, name, code: editor.getValue(), isPublic, time: Timestamp.now()
        });
        document.getElementById('save-modal').classList.remove('active');
        document.getElementById('repo-name').value = '';
    };

    window.logout = () => signOut(auth);

    // Init
    updatePreview();
    setTimeout(() => document.querySelector('.login-screen')?.classList.remove('hidden'), 500);
</script>
</body>
</html>
